# ═══════════════════════════════════════════════════════════
#  Docker profile — overrides for containerised deployment
# ═══════════════════════════════════════════════════════════

spring.application.name=tutionSAAS

# ── MySQL via Docker-internal network ──────────────────────
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:edutech_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Clerk Security ────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:https://improved-dinosaur-18.clerk.accounts.dev}
clerk.secret-key=${CLERK_SECRET_KEY:sk_test_UM1mCZupRqaXVfLo3BMPn0ptsj8pw2PLlwZvtQFsSL}

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.storage.local.path=/app/uploads

# ── Frontend URL (for CORS + invite links) ────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Logging (quieter in production) ───────────────────────
logging.level.root=INFO
logging.level.com.arnav.tutionSAAS=INFO
logging.level.org.hibernate.SQL=WARN

# ── Server ────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
