spring.application.name=tutionSAAS

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/edutech_db
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Clerk Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://improved-dinosaur-18.clerk.accounts.dev

# Email (SMTP) - Replace with real credentials when ready
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local file storage path
app.storage.local.path=./uploads

# Frontend URL (placeholder — update when frontend is deployed)
app.frontend.url=http://localhost:3000