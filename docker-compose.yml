version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tutionsaas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: edutech_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tutionsaas-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tutionsaas-backend:latest
    container_name: tutionsaas-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=edutech_db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=admin123
      - CLERK_ISSUER_URI=https://improved-dinosaur-18.clerk.accounts.dev
      - CLERK_SECRET_KEY=sk_test_UM1mCZupRqaXVfLo3BMPn0ptsj8pw2PLlwZvtQFsSL
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - tutionsaas-network
    restart: unless-stopped

networks:
  tutionsaas-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
